name: Test Pipeline

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Verify npm fallback lockfile
        run: nix develop --command npm ci --dry-run --ignore-scripts

      - name: Install Dependencies
        run: nix develop --command pnpm install --frozen-lockfile

      - name: Run tests
        run: nix develop --command pnpm test

      - name: Run e2e tests
        run: nix develop --command pnpm test:e2e

  android-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: pnpm install --frozen-lockfile

      # Keep Android tooling outside the Nix job: this is the setup available
      # to regular GitHub Actions and the intentionally minimal act runner.
      - run: pnpm android:lint
