name: Test Pipeline

on:
  push:
  pull_request:

jobs:
  # `test:full` is the convenient local, sequential command for these checks.
  # CI runs its parts separately instead: the Nix job has the web and e2e
  # dependencies available, while Android lint needs its own JDK/SDK setup.
  # Keeping them as jobs also lets the slower Android check run in parallel.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Verify npm fallback lockfile
        run: nix develop --command npm ci --dry-run --ignore-scripts

      - name: Install Dependencies
        run: nix develop --command pnpm install --frozen-lockfile

      - name: Run tests
        run: nix develop --command pnpm test

      - name: Run e2e tests
        run: nix develop --command pnpm test:e2e

      # Deploy the exact files produced by the test command instead of
      # rebuilding the application in the deployment job.
      - name: Upload tested web build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error
          include-hidden-files: true

  android-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: pnpm install --frozen-lockfile

      # Keep Android tooling outside the Nix job: this is the setup available
      # to regular GitHub Actions and the intentionally minimal act runner.
      - run: pnpm android:lint

  deploy-netlify:
    runs-on: ubuntu-latest
    needs: [test, android-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: netlify-production
      cancel-in-progress: true
    steps:
      # Keep netlify.toml in the workspace so the CLI deploy includes the
      # existing redirects, cache policy, and security headers.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download tested web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Deploy to Netlify production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -eu
          : "${NETLIFY_AUTH_TOKEN:?Set the NETLIFY_AUTH_TOKEN secret.}"
          : "${NETLIFY_SITE_ID:?Set the NETLIFY_SITE_ID secret.}"
          npx --yes netlify-cli@26.2.0 deploy \
            --prod \
            --no-build \
            --dir=dist \
            --message="ngit act $GITHUB_SHA"
