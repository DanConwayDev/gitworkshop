name: CI and deployments

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # `test:full` is the convenient local, sequential command for these checks.
  # CI runs its parts separately instead: the Nix job has the web and e2e
  # dependencies available, while Android lint needs its own JDK/SDK setup.
  # Keeping them as jobs also lets the slower Android check run in parallel.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Verify npm fallback lockfile
        run: nix develop --command npm ci --dry-run --ignore-scripts

      - name: Install Dependencies
        run: nix develop --command pnpm install --frozen-lockfile

      - name: Run tests
        run: nix develop --command pnpm test

      - name: Run e2e tests
        run: nix develop --command pnpm test:e2e

      # Deploy the exact files produced by the test command instead of
      # rebuilding the application in the deployment job.
      - name: Upload tested web build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error
          include-hidden-files: true

  android-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: pnpm install --frozen-lockfile

      # Keep Android tooling outside the Nix job: this is the setup available
      # to regular GitHub Actions and the intentionally minimal act runner.
      - run: pnpm android:lint

  deploy-netlify:
    runs-on: ubuntu-latest
    needs: [test, android-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: netlify-production
      cancel-in-progress: true
    steps:
      # Keep netlify.toml in the workspace so the CLI deploy includes the
      # existing redirects, cache policy, and security headers.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download tested web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Deploy to Netlify production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -eu
          : "${NETLIFY_AUTH_TOKEN:?Set the NETLIFY_AUTH_TOKEN secret.}"
          : "${NETLIFY_SITE_ID:?Set the NETLIFY_SITE_ID secret.}"
          npx --yes netlify-cli@26.2.0 deploy \
            --prod \
            --no-build \
            --dir=dist \
            --message="ngit act $GITHUB_SHA"

  build-android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, android-lint]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.version.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -eu
          : "${ANDROID_KEYSTORE_BASE64:?Set the ANDROID_KEYSTORE_BASE64 secret.}"
          : "${ANDROID_KEYSTORE_PASSWORD:?Set the ANDROID_KEYSTORE_PASSWORD secret.}"
          : "${ANDROID_KEY_ALIAS:?Set the ANDROID_KEY_ALIAS secret.}"

          signing_dir="$RUNNER_TEMP/gitworkshop-signing"
          keystore="$signing_dir/gitworkshop-upload.jks"
          umask 077
          mkdir -p "$signing_dir"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore"
          cat > android/signing.properties <<EOF
          storeFile=$keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - run: pnpm install --frozen-lockfile

      - name: Read app version
        id: version
        run: |
          set -eu
          . ./version.properties
          printf 'name=%s\n' "$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify release tag
        if: github.ref_type == 'tag'
        run: |
          set -eu
          . ./version.properties
          expected_tag="v$APP_VERSION"
          if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
            printf 'Release tag must be %s, got %s\n' "$expected_tag" "$GITHUB_REF_NAME" >&2
            exit 1
          fi

      # Build both distributable formats in one Gradle invocation. Zapstore
      # publishing runs in a dependent job using the uploaded signed APK.
      - run: pnpm android:build:release

      - name: Name release artifacts
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: |
          set -eu
          release_dir="$RUNNER_TEMP/gitworkshop-android-v$VERSION_NAME"
          mkdir -p "$release_dir"
          cp android/app/build/outputs/apk/release/app-release.apk \
            "$release_dir/gitworkshop-android-v$VERSION_NAME.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab \
            "$release_dir/gitworkshop-android-v$VERSION_NAME.aab"

      # The AAB and APK have been signed at this point, so neither the keystore
      # nor the generated file containing its passwords is needed any longer.
      # Run even when the build fails after signing configuration is created.
      - name: Remove release signing material
        if: ${{ always() }}
        run: |
          rm -f android/signing.properties
          rm -rf "$RUNNER_TEMP/gitworkshop-signing"

      - uses: actions/upload-artifact@v4
        with:
          name: gitworkshop-android-v${{ steps.version.outputs.name }}
          path: |
            ${{ runner.temp }}/gitworkshop-android-v${{ steps.version.outputs.name }}/gitworkshop-android-v${{ steps.version.outputs.name }}.apk
            ${{ runner.temp }}/gitworkshop-android-v${{ steps.version.outputs.name }}/gitworkshop-android-v${{ steps.version.outputs.name }}.aab
          if-no-files-found: error

  publish-zapstore:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-android-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download signed APK
        uses: actions/download-artifact@v4
        with:
          name: gitworkshop-android-v${{ needs.build-android-release.outputs.version }}
          path: release-artifacts

      - name: Publish to Zapstore
        env:
          SIGN_WITH: ${{ secrets.ZAPSTORE_BUNKER_URL }}
          ZAPSTORE_CLIENT_KEY: ${{ secrets.ZAPSTORE_CLIENT_KEY }}
          VERSION_NAME: ${{ needs.build-android-release.outputs.version }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REF_TYPE: ${{ github.ref_type }}
          RELAY_URLS: wss://relay.zapstore.dev,wss://relay.ditto.pub,wss://relay.dreamith.to,wss://relay.primal.net
        run: |
          set -eu
          : "${SIGN_WITH:?Set the ZAPSTORE_BUNKER_URL secret.}"
          : "${ZAPSTORE_CLIENT_KEY:?Set the ZAPSTORE_CLIENT_KEY secret.}"

          if [ "$RELEASE_REF_TYPE" = "tag" ]; then
            VERSION_NAME="${RELEASE_TAG#v}"
          fi

          apk_path="release-artifacts/gitworkshop-android-v$VERSION_NAME.apk"
          test -f "$apk_path"

          go install github.com/zapstore/zsp@latest
          export PATH="$(go env GOPATH)/bin:$PATH"

          # zsp creates a NIP-46 client key on first use. Restore that key so
          # the bunker recognizes this CI workflow as the same application.
          bunker_pubkey="${SIGN_WITH#bunker://}"
          bunker_pubkey="${bunker_pubkey%%\?*}"
          test "$bunker_pubkey" != "$SIGN_WITH"
          umask 077
          mkdir -p ~/.config/zsp/bunker-keys
          printf '%s\n' "$ZAPSTORE_CLIENT_KEY" > ~/.config/zsp/bunker-keys/"$bunker_pubkey".key

          release_config="$(mktemp zapstore-release.XXXXXX.yaml)"
          trap 'rm -f "$release_config"' EXIT
          cp zapstore.yaml "$release_config"
          sed -i "2i release_source: ./$apk_path" "$release_config"
          sed -i "2i version: $VERSION_NAME" "$release_config"
          zsp publish --quiet --skip-metadata --skip-preview "$release_config"
