name: Android release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -eu
          : "${ANDROID_KEYSTORE_BASE64:?Set the ANDROID_KEYSTORE_BASE64 secret.}"
          : "${ANDROID_KEYSTORE_PASSWORD:?Set the ANDROID_KEYSTORE_PASSWORD secret.}"
          : "${ANDROID_KEY_ALIAS:?Set the ANDROID_KEY_ALIAS secret.}"
          : "${ANDROID_KEY_PASSWORD:?Set the ANDROID_KEY_PASSWORD secret.}"

          signing_dir="$RUNNER_TEMP/gitworkshop-signing"
          keystore="$signing_dir/gitworkshop-upload.jks"
          umask 077
          mkdir -p "$signing_dir"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore"
          cat > android/signing.properties <<EOF
          storeFile=$keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - run: pnpm install --frozen-lockfile

      - run: pnpm android:build:release

      - uses: actions/upload-artifact@v4
        with:
          name: gitworkshop-android-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
