apply plugin: 'com.android.application'

def releaseSigningPropertiesFile = rootProject.file('signing.properties')
def releaseSigningProperties = new Properties()
if (releaseSigningPropertiesFile.exists()) {
    releaseSigningPropertiesFile.withInputStream { releaseSigningProperties.load(it) }
}

def versionPropertiesFile = rootProject.file('../version.properties')
def versionProperties = new Properties()
if (!versionPropertiesFile.exists()) {
    throw new GradleException("Android version configuration is required: ${versionPropertiesFile}")
}
versionPropertiesFile.withInputStream { versionProperties.load(it) }

def appVersionName = versionProperties.getProperty('APP_VERSION')?.trim()
def versionMatcher = appVersionName ? (appVersionName =~ /^(\d+)\.(\d+)\.(\d+)(?:-rc\.([1-9]\d?))?$/) : null
if (!versionMatcher || !versionMatcher.matches()) {
    throw new GradleException("APP_VERSION must use major.minor.patch or major.minor.patch-rc.N format in ${versionPropertiesFile}")
}
// versionCode = major * 100_000_000 + minor * 100_000 + patch * 100 + stage.
// Release candidates use stages 1–98; the final release uses 99.
def releaseStage = versionMatcher[0][4] ? versionMatcher[0][4].toInteger() : 99
def appVersionCode = versionMatcher[0][1].toInteger() * 100_000_000 +
    versionMatcher[0][2].toInteger() * 100_000 + versionMatcher[0][3].toInteger() * 100 + releaseStage
if (appVersionCode > 2_100_000_000) {
    throw new GradleException("APP_VERSION produces an Android versionCode above 2100000000")
}

def requiredReleaseSigningProperties = ['storeFile', 'storePassword', 'keyAlias', 'keyPassword']
def missingReleaseSigningProperties = requiredReleaseSigningProperties.findAll {
    !releaseSigningProperties.getProperty(it)?.trim()
}

android {
    namespace = "dev.gitworkshop"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "dev.gitworkshop"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName appVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (missingReleaseSigningProperties.empty) {
                storeFile rootProject.file(releaseSigningProperties.getProperty('storeFile'))
                storePassword releaseSigningProperties.getProperty('storePassword')
                keyAlias releaseSigningProperties.getProperty('keyAlias')
                keyPassword releaseSigningProperties.getProperty('keyPassword')
            }
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

gradle.taskGraph.whenReady { taskGraph ->
    def buildsRelease = taskGraph.allTasks.any { it.name.toLowerCase().contains('release') }
    if (buildsRelease && !missingReleaseSigningProperties.empty) {
        def source = releaseSigningPropertiesFile.exists()
            ? "missing fields: ${missingReleaseSigningProperties.join(', ')}"
            : "file not found"
        throw new GradleException(
            "Release signing configuration is required (${source}). " +
            "Create android/signing.properties with storeFile, storePassword, keyAlias, and keyPassword. " +
            "Release builds never use the debug key.",
        )
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
