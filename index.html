<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%APP_NAME% - Decentralized Git</title>
    <meta
      name="description"
      content="Decentralized GitHub alternative over Nostr"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="%APP_NAME% - Decentralized Git" />
    <meta
      property="og:description"
      content="Decentralized GitHub alternative over Nostr"
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="%APP_NAME% — git collaboration without the platform"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.png" />
    <meta
      http-equiv="content-security-policy"
      content="default-src 'none'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; frame-src 'self' https:; font-src 'self'; base-uri 'self'; manifest-src 'self'; connect-src 'self' blob: https: wss:; img-src 'self' data: blob: https:; media-src 'self' https:"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      body {
        margin: 0;
        background: #fcfcfd;
        scrollbar-gutter: stable;
      }
      html.dark body {
        background: #16171e;
      }
    </style>
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root">
      <style>
        #app-splash {
          position: fixed;
          inset: 0;
          background: #16171e;
          font-family:
            system-ui,
            -apple-system,
            sans-serif;
          z-index: 9999;
        }
        #app-splash .splash-name {
          color: #ede9f6;
        }
        #app-splash .splash-tagline {
          color: #7a7490;
        }
        #app-splash .splash-ring {
          border-color: #2a2535;
          border-top-color: #ff79c6;
        }
        .splash-logo {
          width: 64px;
          height: 64px;
          border-radius: 16px;
          flex-shrink: 0;
        }
        .splash-name {
          font-size: 22px;
          font-weight: 600;
          letter-spacing: -0.3px;
          color: #1e1b2e;
          margin: 0;
        }
        .splash-tagline {
          font-size: 13px;
          color: #8b8699;
          margin: 0;
        }
        .splash-ring {
          width: 28px;
          height: 28px;
          border-radius: 50%;
          border: 3px solid #ede9f6;
          border-top-color: #ff79c6;
          animation: splash-spin 0.75s linear infinite;
        }
        @keyframes splash-spin {
          to {
            transform: rotate(360deg);
          }
        }
        #splash-content {
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 20px;
          opacity: 0;
          animation: splash-fade-in 0.4s ease-out 2s forwards;
        }
        @keyframes splash-fade-in {
          to {
            opacity: 1;
          }
        }
      </style>
      <div id="app-splash">
        <div id="splash-content">
          <img
            class="splash-logo"
            src="/icons/icon-192x192.png"
            width="64"
            height="64"
            alt=""
          />
          <div
            style="
              display: flex;
              flex-direction: column;
              align-items: center;
              gap: 4px;
            "
          >
            <p class="splash-name">GitWorkshop</p>
            <p class="splash-tagline">Decentralized Git</p>
          </div>
          <div class="splash-ring"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
